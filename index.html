<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Participa por premios en efectivo</title>

<!-- Open Graph (para que FB muestre imagen bonita) -->
<meta property="og:title" content="🎁 Participa por premios en efectivo">
<meta property="og:description" content="Cupos limitados en Colombia 🇨🇴">
<meta property="og:image" content="https://TU-IMAGEN.jpg">
<meta property="og:type" content="website">

<style>
body{font-family:Arial;margin:0;background:#0b0b0b;color:#fff;text-align:center}
.wrap{max-width:420px;margin:auto;padding:20px}
.card{background:#111;border-radius:14px;padding:18px;box-shadow:0 10px 25px rgba(0,0,0,.4)}
h1{margin:0 0 10px;color:#00ff88}
.badge{display:inline-block;background:#222;padding:6px 10px;border-radius:999px;margin-bottom:10px}
.btn{display:block;background:#00ff88;color:#000;padding:14px;border-radius:10px;text-decoration:none;font-weight:700;margin-top:14px}
.small{opacity:.8;font-size:13px}
.timer{color:#ff4d4d;font-weight:700;margin-top:10px}
ul{list-style:none;padding:0;text-align:left}
li{margin:8px 0}
.check{color:#00ff88;margin-right:6px}
</style>
</head>
<body>

<div class="wrap">
  <div class="card">
    <div class="badge">Colombia 🇨🇴</div>
    <h1>🎁 Participa por premios en efectivo</h1>
    <p class="small">Estamos seleccionando participantes por tiempo limitado.</p>

    <ul>
      <li><span class="check">✔</span> Registro rápido</li>
      <li><span class="check">✔</span> Sin complicaciones</li>
      <li><span class="check">✔</span> Cupos limitados</li>
    </ul>

    <div class="timer" id="t">02:00</div>

    <a href="/landing.html" class="btn">Continuar</a>
    <p class="small">Al continuar aceptas ver los detalles de la promoción.</p>
  </div>
</div>

<script>
let time=120, el=document.getElementById('t');
setInterval(()=>{let m=Math.floor(time/60),s=time%60;
el.textContent=`${m}:${s<10?'0'+s:s}`; if(time>0) time--;},1000);
</script>

</body>
</html>
